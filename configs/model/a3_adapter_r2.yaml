  payload_bytes: 18
  serialized_record_bytes: 21
  items_primary: 650      # 16,384 B ceiling
  items_reserved: 601     # 15,360 B ceiling (1 KiB reserve)
  selector: class_balanced

budget:
  used_bytes_primary: 16371
  used_bytes_reserved: 15342
  budget_bytes: 16384

optimizer:
  name: adam
