# Conda environment for BudgetCL-ECG.
#
#   conda env create -f environment.yml
#   conda activate budgetcl-ecg
name: budgetcl-ecg

channels:
  - conda-forge

dependencies:
  - python=3.12
  - pip
  - numpy=2.1.3
  - scipy=1.15.2
  - pandas=2.2.3
  - matplotlib=3.10.0
  - scikit-learn=1.6.1
  - pip:
      - tensorflow==2.21.0
      - wfdb==4.3.0
      - pyyaml==6.0.2
      - tqdm==4.67.1
      - joblib==1.4.2
